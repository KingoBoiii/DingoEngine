name: Build release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

env:
  SOLUTION_FILE_PATH: 'DingoEngine.slnx'
  PREMAKE_VERSION: '5.0.0-beta8'

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        build-configuration: [Debug, Release, Distribution]
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        lfs: true
        fetch-depth: 0

    - uses: microsoft/setup-msbuild@v1.1
      with:
        msbuild-architecture: x64

    - name: Get Vulkan SDK version
      id: vulkan
      run: |
        $version = (Invoke-WebRequest -Uri "https://vulkan.lunarg.com/sdk/latest/windows.txt").Content.Trim()
        echo "version=$version" >> $env:GITHUB_OUTPUT

    - name: Cache Vulkan SDK
      id: cache-vulkan
      uses: actions/cache@v4
      with:
        path: C:\VulkanSDK\${{ steps.vulkan.outputs.version }}
        key: vulkan-sdk-windows-${{ steps.vulkan.outputs.version }}-debug

    - name: Install Vulkan SDK
      if: steps.cache-vulkan.outputs.cache-hit != 'true'
      run: |
        $version = "${{ steps.vulkan.outputs.version }}"
        $installer = "vulkansdk-windows-X64-$version.exe"
        Invoke-WebRequest -Uri "https://sdk.lunarg.com/sdk/download/$version/windows/$installer" -OutFile $installer
        Start-Process -FilePath ".\$installer" -ArgumentList "--accept-licenses --default-answer --confirm-command install com.lunarg.vulkan.debug" -Wait

    - name: Set VULKAN_SDK environment variable
      run: echo "VULKAN_SDK=C:\VulkanSDK\${{ steps.vulkan.outputs.version }}" >> $env:GITHUB_ENV

    - name: Install premake5
      run: |
        Invoke-WebRequest -Uri "https://github.com/premake/premake-core/releases/download/v${{env.PREMAKE_VERSION}}/premake-${{env.PREMAKE_VERSION}}-windows.zip" -OutFile premake5-windows.zip
        Expand-Archive -Path premake5-windows.zip -DestinationPath premake5-bin -Force

    - name: Get version
      id: version
      run: |
        $tag = "${{ github.ref_name }}"
        $ver = $tag.TrimStart('v')
        $parts = $ver.Split('.')
        $commits = git rev-list --count HEAD
        echo "VERSION=$ver.$commits" >> $env:GITHUB_OUTPUT
        echo "VERSION_MAJOR=$($parts[0])" >> $env:GITHUB_OUTPUT
        echo "VERSION_MINOR=$($parts[1])" >> $env:GITHUB_OUTPUT
        echo "VERSION_PATCH=$($parts[2])" >> $env:GITHUB_OUTPUT
        echo "VERSION_BUILD=$commits" >> $env:GITHUB_OUTPUT

    - name: Generate BuildInfo.h
      run: |
        $major = "${{steps.version.outputs.VERSION_MAJOR}}"
        $minor = "${{steps.version.outputs.VERSION_MINOR}}"
        $patch = "${{steps.version.outputs.VERSION_PATCH}}"
        $build = "${{steps.version.outputs.VERSION_BUILD}}"
        "#pragma once", "#define DE_ENGINE_VERSION_MAJOR $major", "#define DE_ENGINE_VERSION_MINOR $minor", "#define DE_ENGINE_VERSION_PATCH $patch", "#define DE_ENGINE_VERSION_BUILD $build" | Set-Content include/DingoEngine/BuildInfo.h -Encoding utf8

    - name: Premake
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: .\premake5-bin\premake5.exe vs2026

    - name: Build
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: msbuild ${{env.SOLUTION_FILE_PATH}} /m /p:Configuration=${{matrix.build-configuration}} /p:PlatformToolset=v143 -fl -flp:logfile=logs/Build-${{matrix.build-configuration}}.log

    # Ship the self-contained lib (engine + all vendor libs merged by the
    # lib.exe post-build step) instead of the engine-only lib.
    - name: Use merged self-contained lib
      run: Copy-Item ".\build\dist\${{matrix.build-configuration}}-windows-x86_64\DingoEngine.lib" ".\build\bin\${{matrix.build-configuration}}-windows-x86_64\DingoEngine\DingoEngine.lib" -Force

    - name: Copy include files
      run: |
        robocopy .\include .\build\bin\${{matrix.build-configuration}}-windows-x86_64\DingoEngine\include /e /z
        if ($lastexitcode -lt 8) { exit 0 } else { exit 1 }

    - name: Copy glm files (third-party)
      run: |
        robocopy .\vendor\glm .\build\bin\${{matrix.build-configuration}}-windows-x86_64\DingoEngine\glm /e /z
        if ($lastexitcode -lt 8) { exit 0 } else { exit 1 }

    - name: Create ZIP archive
      run: |
        $config = "${{ matrix.build-configuration }}"
        $srcDir = ".\build\bin\$config-windows-x86_64\DingoEngine"
        $zipName = "DingoEngine-${{steps.version.outputs.VERSION}}-$config-windows-x86_64.zip"
        Compress-Archive -Path "$srcDir\*" -DestinationPath ".\$zipName" -Force

    - name: Upload to GitHub Release
      run: |
        $config = "${{ matrix.build-configuration }}"
        $zipName = "DingoEngine-${{steps.version.outputs.VERSION}}-$config-windows-x86_64.zip"
        gh release upload "${{ github.ref_name }}" "$zipName" --clobber
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload static library artifact
      uses: actions/upload-artifact@v4
      with:
        name: dingo-engine-windows-${{matrix.build-configuration}}-${{steps.version.outputs.VERSION}}
        path: .\build\bin\${{matrix.build-configuration}}-windows-x86_64\DingoEngine

    - name: Upload FlappyBird binary
      if: matrix.build-configuration == 'Distribution'
      uses: actions/upload-artifact@v4
      with:
        name: flappybird-binary-windows
        path: .\build\bin\Distribution-windows-x86_64\FlappyBird

    - name: Upload Dungeon Crawler binary
      if: matrix.build-configuration == 'Distribution'
      uses: actions/upload-artifact@v4
      with:
        name: dungeoncrawler-binary-windows
        path: .\build\bin\Distribution-windows-x86_64\DungeonCrawler

    - name: Upload Breakout 3D binary
      if: matrix.build-configuration == 'Distribution'
      uses: actions/upload-artifact@v4
      with:
        name: breakout3d-binary-windows
        path: .\build\bin\Distribution-windows-x86_64\Breakout3D

    - name: Upload Space Invaders binary
      if: matrix.build-configuration == 'Distribution'
      uses: actions/upload-artifact@v4
      with:
        name: space-invaders-binary-windows
        path: .\build\bin\Distribution-windows-x86_64\SpaceInvaders

    - name: Upload Angry Birds binary
      if: matrix.build-configuration == 'Distribution'
      uses: actions/upload-artifact@v4
      with:
        name: angrybirds-binary-windows
        path: .\build\bin\Distribution-windows-x86_64\AngryBirds

    - name: Upload Dungeon Crawler 3D binary
      if: matrix.build-configuration == 'Distribution'
      uses: actions/upload-artifact@v4
      with:
        name: dungeoncrawler3d-binary-windows
        path: .\build\bin\Distribution-windows-x86_64\DungeonCrawler3D

