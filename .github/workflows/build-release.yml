        $zipName = "FlappyBird-${{steps.version.outputs.VERSION}}-windows-x86_64.zip"
        Compress-Archive -Path ".\flappybird\*" -DestinationPath ".\$zipName" -Force

    - name: Upload to GitHub Release
      run: gh release upload "${{ github.ref_name }}" "FlappyBird-${{steps.version.outputs.VERSION}}-windows-x86_64.zip" --clobber
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: flappybird-windows-distribution-${{steps.version.outputs.VERSION}}
        path: .\flappybird

