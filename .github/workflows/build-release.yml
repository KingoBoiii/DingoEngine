name: Build release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

env:
  SOLUTION_FILE_PATH: 'DingoEngine.slnx'
  PREMAKE_VERSION: '5.0.0-beta8'

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        build-configuration: [Debug, Release, Distribution]
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        lfs: true
        fetch-depth: 0

    - uses: microsoft/setup-msbuild@v1.1
      with:
        msbuild-architecture: x64

    - name: Install Vulkan SDK
      run: |
        $version = (Invoke-WebRequest -Uri "https://vulkan.lunarg.com/sdk/latest/windows.txt").Content.Trim()
        $installer = "vulkansdk-windows-X64-$version.exe"
        Invoke-WebRequest -Uri "https://sdk.lunarg.com/sdk/download/$version/windows/$installer" -OutFile $installer
        Start-Process -FilePath ".\$installer" -ArgumentList "--accept-licenses --default-answer --confirm-command install" -Wait
        echo "VULKAN_SDK=C:\VulkanSDK\$version" >> $env:GITHUB_ENV

    - name: Install premake5
      run: |
        Invoke-WebRequest -Uri "https://github.com/premake/premake-core/releases/download/v${{env.PREMAKE_VERSION}}/premake-${{env.PREMAKE_VERSION}}-windows.zip" -OutFile premake5-windows.zip
        Expand-Archive -Path premake5-windows.zip -DestinationPath premake5-bin -Force

    - name: Get version
      id: version
      run: |
        $tag = "${{ github.ref_name }}"
        $ver = $tag.TrimStart('v')
        $parts = $ver.Split('.')
        echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
        echo "VERSION_MAJOR=$($parts[0])" >> $env:GITHUB_OUTPUT
        echo "VERSION_MINOR=$($parts[1])" >> $env:GITHUB_OUTPUT
        echo "VERSION_PATCH=$($parts[2])" >> $env:GITHUB_OUTPUT

    - name: Generate BuildInfo.h
      run: |
        $major = "${{steps.version.outputs.VERSION_MAJOR}}"
        $minor = "${{steps.version.outputs.VERSION_MINOR}}"
        $patch = "${{steps.version.outputs.VERSION_PATCH}}"
        "#pragma once", "#define DE_ENGINE_VERSION_MAJOR $major", "#define DE_ENGINE_VERSION_MINOR $minor", "#define DE_ENGINE_VERSION_PATCH $patch" | Set-Content include/DingoEngine/BuildInfo.h -Encoding utf8

    - name: Premake
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: .\premake5-bin\premake5.exe vs2026

    - name: Build
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: |
        if ("${{ matrix.build-configuration }}" -eq "Debug") {
          msbuild ${{env.SOLUTION_FILE_PATH}} /m /p:Configuration=${{matrix.build-configuration}} /p:PlatformToolset=v143 /p:RuntimeLibrary=MultiThreadedDLL -fl -flp:logfile=logs/Build-${{matrix.build-configuration}}.log
        } else {
          msbuild ${{env.SOLUTION_FILE_PATH}} /m /p:Configuration=${{matrix.build-configuration}} /p:PlatformToolset=v143 -fl -flp:logfile=logs/Build-${{matrix.build-configuration}}.log
        }

    - name: Copy include files
      run: |
        robocopy .\include .\build\bin\${{matrix.build-configuration}}-windows-x86_64\DingoEngine\include /e /z
        if ($lastexitcode -lt 8) { exit 0 } else { exit 1 }

    - name: Copy glm files (third-party)
      run: |
        robocopy .\vendor\glm .\build\bin\${{matrix.build-configuration}}-windows-x86_64\DingoEngine\glm /e /z
        if ($lastexitcode -lt 8) { exit 0 } else { exit 1 }

    - name: Copy imgui files (third-party)
      run: |
        robocopy .\vendor\imgui .\build\bin\${{matrix.build-configuration}}-windows-x86_64\DingoEngine\imgui imgui.h
        if ($lastexitcode -lt 8) { exit 0 } else { exit 1 }

    - name: Create ZIP archive
      run: |
        $config = "${{ matrix.build-configuration }}"
        $srcDir = ".\build\bin\$config-windows-x86_64\DingoEngine"
        $zipName = "DingoEngine-${{ github.ref_name }}-$config-windows-x86_64.zip"
        Compress-Archive -Path "$srcDir\*" -DestinationPath ".\$zipName" -Force

    - name: Upload to GitHub Release
      run: |
        $config = "${{ matrix.build-configuration }}"
        $zipName = "DingoEngine-${{ github.ref_name }}-$config-windows-x86_64.zip"
        gh release upload "${{ github.ref_name }}" "$zipName" --clobber
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload static library artifact
      uses: actions/upload-artifact@v4
      with:
        name: dingo-engine-windows-${{matrix.build-configuration}}-${{steps.version.outputs.VERSION}}
        path: .\build\bin\${{matrix.build-configuration}}-windows-x86_64\DingoEngine

    - name: Upload FlappyBird binary
      if: matrix.build-configuration == 'Distribution'
      uses: actions/upload-artifact@v4
      with:
        name: flappybird-binary-windows
        path: .\build\bin\Distribution-windows-x86_64\FlappyBird

  flappy-bird:
    needs: build-windows
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
      with:
        lfs: true
        submodules: false

    - name: Download FlappyBird binary
      uses: actions/download-artifact@v4
      with:
        name: flappybird-binary-windows
        path: .\flappybird

    - name: Get version
      id: version
      run: |
        $tag = "${{ github.ref_name }}"
        $ver = $tag.TrimStart('v')
        echo "VERSION=$ver" >> $env:GITHUB_OUTPUT

    - name: Copy assets
      run: |
        robocopy .\examples\FlappyBird\assets .\flappybird\assets /e /z
        if ($lastexitcode -lt 8) { exit 0 } else { exit 1 }

    - name: Create ZIP archive
      run: |
        $zipName = "FlappyBird-${{ github.ref_name }}-windows-x86_64.zip"
        Compress-Archive -Path ".\flappybird\*" -DestinationPath ".\$zipName" -Force

    - name: Upload to GitHub Release
      run: gh release upload "${{ github.ref_name }}" "FlappyBird-${{ github.ref_name }}-windows-x86_64.zip" --clobber
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: flappybird-windows-distribution-${{steps.version.outputs.VERSION}}
        path: .\flappybird

  build-linux:
    if: 1 == 0
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build-configuration: [Debug, Release, Distribution]

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        lfs: true

    - name: Install Vulkan SDK
      run: |
        wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc
        sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-noble.list https://packages.lunarg.com/vulkan/lunarg-vulkan-noble.list
        sudo apt-get update
        sudo apt-get install -y vulkan-sdk libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev

    - name: Install premake5
      run: |
        wget -q https://github.com/premake/premake-core/releases/download/v${{env.PREMAKE_VERSION}}/premake-${{env.PREMAKE_VERSION}}-linux.tar.gz
        tar -xzf premake-${{env.PREMAKE_VERSION}}-linux.tar.gz
        chmod +x premake5
        sudo mv premake5 /usr/local/bin/premake5

    - name: Generate makefiles
      run: premake5 gmake
      env:
        VULKAN_SDK: /usr

    - name: Build
      run: |
        config=$(echo "${{ matrix.build-configuration }}" | tr '[:upper:]' '[:lower:]')
        make -j$(nproc) config=${config}_x86_64 DingoEngine FlappyBird
      env:
        VULKAN_SDK: /usr

    - name: Copy include files
      run: cp -r ./include ./build/bin/${{ matrix.build-configuration }}-linux-x86_64/DingoEngine/

    - name: Copy glm files (third-party)
      run: cp -r ./vendor/glm ./build/bin/${{ matrix.build-configuration }}-linux-x86_64/DingoEngine/

    - name: Copy imgui header (third-party)
      run: |
        mkdir -p ./build/bin/${{ matrix.build-configuration }}-linux-x86_64/DingoEngine/imgui
        cp ./vendor/imgui/imgui.h ./build/bin/${{ matrix.build-configuration }}-linux-x86_64/DingoEngine/imgui/

    - name: Create tar archive
      run: |
        config="${{ matrix.build-configuration }}"
        tar -czf "DingoEngine-${{ github.ref_name }}-$config-linux-x86_64.tar.gz" \
          -C "./build/bin/$config-linux-x86_64/DingoEngine" .

    - name: Upload to GitHub Release
      run: |
        config="${{ matrix.build-configuration }}"
        gh release upload "${{ github.ref_name }}" \
          "DingoEngine-${{ github.ref_name }}-$config-linux-x86_64.tar.gz" --clobber
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload static library artifact
      uses: actions/upload-artifact@v4
      with:
        name: dingo-engine-linux-${{ matrix.build-configuration }}
        path: ./build/bin/${{ matrix.build-configuration }}-linux-x86_64/DingoEngine

    - name: Copy FlappyBird assets
      if: matrix.build-configuration == 'Distribution'
      run: cp -r ./examples/FlappyBird/assets ./build/bin/Distribution-linux-x86_64/FlappyBird/

    - name: Upload FlappyBird artifact
      if: matrix.build-configuration == 'Distribution'
      uses: actions/upload-artifact@v4
      with:
        name: flappybird-linux-distribution
        path: ./build/bin/Distribution-linux-x86_64/FlappyBird
